<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeeTime — 같이 보자, 같은 시간에</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fafafa;
    color: #1a1a2e;
    min-height: 100vh;
  }

  .hero {
    background: linear-gradient(160deg, #667eea 0%, #5448c8 100%);
    color: white;
    padding: 72px 24px 80px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to bottom right, transparent 49.5%, #fafafa 50.5%);
  }
  .hero-inner { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; }

  .logo {
    font-size: 2.8em; font-weight: 800;
    margin-bottom: 12px; letter-spacing: -1px;
  }
  .logo-dim { opacity: 0.85; }

  .tagline {
    font-size: 1.15em; opacity: 0.9;
    margin-bottom: 32px; line-height: 1.5;
  }

  .btn-hero {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 15px 32px;
    background: white; color: #5448c8;
    border: none; border-radius: 12px;
    font-family: inherit; font-size: 1.05em; font-weight: 700;
    cursor: pointer; text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  .btn-hero:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

  .section {
    max-width: 720px; margin: -20px auto 0;
    padding: 0 24px 60px;
    position: relative; z-index: 2;
  }

  .features {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 36px;
  }
  .fcard {
    background: white;
    border-radius: 16px;
    padding: 24px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .fcard:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }
  .fcard-icon { font-size: 1.6em; margin-bottom: 10px; }
  .fcard-title { font-weight: 700; font-size: 1em; margin-bottom: 6px; color: #1a1a2e; }
  .fcard-desc { font-size: 0.85em; color: #666; line-height: 1.5; }

  .platforms-section {
    text-align: center; margin-bottom: 36px;
  }
  .platforms-title {
    font-size: 0.85em; font-weight: 600; color: #999;
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .platforms {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
  }
  .ptag {
    background: white; padding: 7px 16px;
    border-radius: 20px; font-size: 0.85em; color: #555;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .discord-bar {
    text-align: center;
    background: white;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .discord-bar a {
    color: #5865F2; text-decoration: none; font-weight: 600; font-size: 0.95em;
  }
  .discord-bar a:hover { text-decoration: underline; }

  .footer {
    text-align: center; padding: 40px 24px;
    color: #999; font-size: 0.82em; line-height: 1.8;
  }
  .footer a { color: #667eea; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  @media (max-width: 520px) {
    .hero { padding: 48px 16px 64px; }
    .logo { font-size: 2em; }
    .features { grid-template-columns: 1fr; }
    .section { padding: 0 16px 40px; }
  }
</style>
</head>
<body>
<div class="hero">
  <div class="hero-inner">
    <div class="logo">⏱ <span class="logo-dim">See</span>Time</div>
    <p class="tagline">같이 보자, 같은 시간에.<br>OTT 동시 시청 크롬 확장 프로그램</p>
    <a href="#" id="cws-link" class="btn-hero">🧩 크롬에 추가하기</a>
  </div>
</div>

<div class="section">
  <div class="features">
    <div class="fcard">
      <div class="fcard-icon">⏱</div>
      <div class="fcard-title">타이머 동기화</div>
      <div class="fcard-desc">호스트 시간에 맞춰 자동 조정. 어긋나면 바로 맞추기.</div>
    </div>
    <div class="fcard">
      <div class="fcard-icon">💬</div>
      <div class="fcard-title">실시간 채팅</div>
      <div class="fcard-desc">사이드바 또는 팝업 창에서 자유롭게 대화.</div>
    </div>
    <div class="fcard">
      <div class="fcard-icon">🔒</div>
      <div class="fcard-title">스포 방지</div>
      <div class="fcard-desc">나보다 앞선 채팅은 자동으로 가려짐.</div>
    </div>
    <div class="fcard">
      <div class="fcard-icon">⏳</div>
      <div class="fcard-title">카운트다운</div>
      <div class="fcard-desc">3, 2, 1 — 동시에 재생 시작!</div>
    </div>
  </div>

  <div class="platforms-section">
    <div class="platforms-title">지원 플랫폼</div>
    <div class="platforms">
      <span class="ptag">넷플릭스</span>
      <span class="ptag">유튜브</span>
      <span class="ptag">티빙</span>
      <span class="ptag">디즈니+</span>
      <span class="ptag">웨이브</span>
      <span class="ptag">왓챠</span>
      <span class="ptag">쿠팡플레이</span>
      <span class="ptag">라프텔</span>
    </div>
  </div>

  <div class="discord-bar">
    💬 <a href="https://discord.gg/wsp7QsuHnb" target="_blank" rel="noopener">디스코드 서버 참여하기</a>
  </div>
</div>

<div class="footer">
  <p>SeeTime &copy; 2026</p>
  <p><a href="./privacy">개인정보처리방침</a></p>
</div>
<script>
  document.getElementById('cws-link').addEventListener('click', function(e) {
    e.preventDefault(); alert('Chrome Web Store 등록 준비 중입니다!');
  });
</script>
</body>
</html>
